version: "3.8"

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./packages/api/.env
    depends_on:
      - redis
    volumes:
      - ./packages/api:/app
      - ./packages/core:/packages/core
      - ./packages/services:/packages/services
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis for background jobs
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Background Worker (Teacher monitoring)
  worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file:
      - ./packages/api/.env
    depends_on:
      - redis
    volumes:
      - ./packages/api:/app
      - ./packages/core:/packages/core
      - ./packages/services:/packages/services
    command: arq app.workers.monitor_worker.WorkerSettings

volumes:
  redis_data:
