name: swipelearn
description: "SwipeLearn - Transform blog posts into swipeable Knowledge Cards"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & Networking
  http: ^1.2.0
  
  # State Management
  provider: ^6.1.0
  
  # Auth & Storage
  flutter_secure_storage: ^9.2.0
  
  # URL Launcher
  url_launcher: ^6.3.0
  
  # Share
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
